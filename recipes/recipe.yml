# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json

name: mayfield-os
description: Mayfield OS - A custom Aurora-based desktop image.

base-image: ghcr.io/ublue-os/aurora
image-version: latest

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    install:
      packages:
        - distrobox
        - htop
        - kate
        - mullvad-vpn
        - golang
        - rust
        - nmap
        - emacs
        - bat
    remove:
      packages:
        - firefox
        - firefox-langpacks

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
      - scope: user
        install:
          - us.zoom.Zoom
          - com.spotify.Client
          - org.kde.kpat
          - com.bitwarden.desktop
          - com.brave.Browser
          - org.libreoffice.LibreOffice

  - type: signing
